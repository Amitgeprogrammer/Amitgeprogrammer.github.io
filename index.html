<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Amit's Data Dashboard</title>
</head>
<body style="font-family: sans-serif; text-align: center; padding: 50px;">

    <h1>Welcome to My Scraper Site</h1>
    <p>This is my first live website! Data from Agenda Exchange is below:</p>
    
    <div id="data-container" style="margin-top: 20px; font-weight: bold; padding: 20px; border: 1px solid #ccc; border-radius: 8px; display: inline-block;">
        Checking for updates...
    </div>

    <script>
        // The ?v= math adds a unique timestamp so the browser NEVER uses an old saved copy
        fetch('data.json?v=' + new Date().getTime(), { cache: 'no-store' })
            .then(response => {
                if (!response.ok) {
                    throw new Error("Network response was not ok");
                }
                return response.json();
            })
            .then(data => {
                // This injects the HTML with your scraped data
                document.getElementById('data-container').innerHTML = `
                    <div style="font-size: 24px; margin-bottom: 10px;">
                        Total Value: <span style="color: black;">${data.total_portfolio}</span>
                    </div>
                    <div style="font-size: 24px; margin-bottom: 20px;">
                        All-Time P&L: <span style="color: green;">${data.all_time_pnl}</span>
                    </div>
                    <small style="color: gray;">Last updated: ${data.last_updated}</small>
                `;
            })
            .catch(error => {
                console.error("Error fetching data:", error);
                document.getElementById('data-container').innerText = "Error loading data. Check the console!";
            });
    </script>

</body>
</html>
