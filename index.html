<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agenda Competition</title>
</head>
<body style="font-family: sans-serif; text-align: center; padding: 50px;">

    <h2>Maintaining the agenda...</h2>
    <h1>IS OUR TOP PRIORITY.</h1>
    <br>
    <p>Agenda Exchange Competition Live:</p>
    
    <div id="data-container" style="margin-top: 20px; font-weight: bold; color: blue;">
        Checking for updates...
    </div>

</body>
<script>
        // The ?v=... math adds a unique timestamp so the browser NEVER uses an old saved copy
        fetch('data.json?v=' + new Date().getTime(), { cache: 'no-store' })
            .then(response => response.json())
            .then(data => {
            .then(response => response.json())
            .then(data => {
                document.getElementById('data-container').innerHTML = `
                    <div style="font-size: 24px; margin-bottom: 10px;">
                        Total Value: <span style="color: black;">${data.total_portfolio}</span>
                    </div>
                    <div style="font-size: 24px; margin-bottom: 20px;">
                        All-Time P&L: <span style="color: green;">${data.all_time_pnl}</span>
                    </div>
                    <small style="color: gray;">Last updated: ${data.last_updated}</small>
                `;
            })
            .catch(error => {
                document.getElementById('data-container').innerText = "Waiting for the first scrape to finish...";
            });
    </script>
</html>
