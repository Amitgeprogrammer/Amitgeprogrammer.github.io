<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agenda Competition</title>
</head>
<body style="font-family: sans-serif; text-align: center; padding: 50px;">

    <h2>Maintaining the agenda...</h2>
    <h1>IS OUR TOP PRIORITY.</h1>
    <br>
    <p>Agenda Exchange Competition Live:</p>
    
    <div id="data-container" style="margin-top: 20px; font-weight: bold; color: blue;">
        Checking for updates...
    </div>

</body>
<script>
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('data-container').innerHTML = 
                    `Data: ${data.scraped_data} <br> <small style="color: gray;">Last scraped: ${data.last_updated}</small>`;
            })
            .catch(error => {
                document.getElementById('data-container').innerText = "Waiting for the first scrape to finish...";
            });
    </script>
</html>
